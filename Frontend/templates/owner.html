<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Data Owner | O'Bay Inventory</title>

    <link rel="stylesheet" href="../css/owner.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- ================= SIDEBAR ================= -->

    <aside class="sidebar">

        <div class="logo">

            <i class="fa-solid fa-mug-hot"></i>

            <h2>O'Bay Inventory</h2>

        </div>

        <ul>

            <li>
                <a href="dashboard.html">
                    <i class="fa-solid fa-chart-line"></i>
                    Dashboard
                </a>
            </li>

            <li>
                <a href="bahan.html">
                    <i class="fa-solid fa-box"></i>
                    Bahan Baku
                </a>
            </li>

            <li>
                <a href="barang_masuk.html">
                    <i class="fa-solid fa-truck"></i>
                    Barang Masuk
                </a>
            </li>

            <li>
                <a href="produk.html">
                    <i class="fa-solid fa-mug-saucer"></i>
                    Produk
                </a>
            </li>

            <li>
                <a href="vendor.html">
                    <i class="fa-solid fa-store"></i>
                    Vendor
                </a>
            </li>

            <li>
                <a href="penggunaan.html">
                    <i class="fa-solid fa-utensils"></i>
                    Penggunaan
                </a>
            </li>

            <li class="active">
                <a href="#">
                    <i class="fa-solid fa-user-tie"></i>
                    Owner
                </a>
            </li>

            <li>
                <a href="staff.html">
                    <i class="fa-solid fa-users"></i>
                    Staff
                </a>
            </li>

        </ul>

    </aside>

    <!-- ================= CONTENT ================= -->

    <main class="content">

        <div class="topbar">

            <h1>Data Owner</h1>

            <div class="top-right">

                <input
                    type="text"
                    id="searchOwner"
                    placeholder="Cari Owner...">

                <button id="btnTambah">

                    <i class="fa-solid fa-plus"></i>

                    Tambah Owner

                </button>

            </div>

        </div>

        <!-- ================= TABLE ================= -->

        <div class="table-container">

            <table>

                <thead>

                    <tr>

                        <th>ID</th>

                        <th>Nama</th>

                        <th>Username</th>

                        <th>Email</th>

                        <th>No Telepon</th>

                        <th>Status</th>

                        <th>Aksi</th>

                    </tr>

                </thead>

                <tbody id="ownerTable">

                </tbody>

            </table>

        </div>

    </main>

</div>

<!-- ================= MODAL ================= -->

<div class="modal" id="ownerModal">

    <div class="modal-content">

        <div class="modal-header">

            <h2 id="modalTitle">

                Tambah Owner

            </h2>

            <button id="closeModal">

                <i class="fa-solid fa-xmark"></i>

            </button>

        </div>

        <form id="ownerForm">

            <input
                type="hidden"
                id="ownerId">

            <div class="form-group">

                <label>Nama Owner</label>

                <input
                    type="text"
                    id="nama"
                    required>

            </div>

            <div class="form-group">

                <label>Username</label>

                <input
                    type="text"
                    id="username"
                    required>

            </div>

            <div class="form-group">

                <label>Email</label>

                <input
                    type="email"
                    id="email">

            </div>

            <div class="form-group">

                <label>No Telepon</label>

                <input
                    type="text"
                    id="telepon">

            </div>

            <div class="form-group">

                <label>Password</label>

                <input
                    type="password"
                    id="password">

            </div>

            <div class="form-group">

                <label>Status</label>

                <select id="status">

                    <option value="AKTIF">

                        Aktif

                    </option>

                    <option value="NONAKTIF">

                        Non Aktif

                    </option>

                </select>

            </div>

            <div class="modal-footer">

                <button
                    class="save-btn"
                    type="submit">

                    Simpan

                </button>

            </div>

        </form>

    </div>

</div>

<script src="../js/owner.js"></script>

</body>
</html>
