<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O'Bay Cafe - Login System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="login-container">
        
        <div class="left-side">
            <img src="MASUKKAN_URL_GAMBAR_CLOUDINARY_KAMU_DI_SINI" alt="O'Bay Cafe Ambience">
        </div>

        <div class="right-side">
            <div class="right-content-wrapper">
                
                <div class="logo">
                    <h1>O'Bay Cafe</h1>
                    <p>INVENTORY CONTROL SYSTEM</p>
                </div>

                <div class="login-box">
                    <h2>Welcome Back!</h2>
                    <p class="subtitle">Silakan masuk ke akun Anda</p>

                    <form id="form-login">
                        <div class="input-group">
                            <label>EMAIL ADDRESS</label>
                            <div class="input-icon">
                                <i class="fa-regular fa-envelope"></i>
                                <input type="email" id="login-email" required placeholder="username@obaycafe.com">
                            </div>
                        </div>

                        <div class="input-group">
                            <div class="password-label-row">
                                <label>PASSWORD</label>
                                <a href="#" class="forgot-link">Forgot Password?</a>
                            </div>
                            <div class="input-icon">
                                <i class="fa-solid fa-lock"></i>
                                <input type="password" id="login-password" required placeholder="••••••••">
                                <i class="fa-regular fa-eye-slash toggle-password" onclick="viewPassword()"></i>
                            </div>
                        </div>

                        <button type="submit">Login to Dashboard &rarr;</button>
                    </form>

                    <div class="divider">or</div>

                    <a href="#" class="google-login">
                        <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/web-24dp/v6_web-24dp.png" alt="Google Logo">
                        <span>Login With Google</span>
                    </a>
                </div>

            </div>
        </div>

    </div>

    <script src="js/login.js"></script>
    <script>
        // Fungsi pembantu sederhana untuk intip password
        function viewPassword() {
            const pwdInput = document.getElementById('login-password');
            const eyeIcon = document.querySelector('.toggle-password');
            if (pwdInput.type === "password") {
                pwdInput.type = "text";
                eyeIcon.classList.replace('fa-eye-slash', 'fa-eye');
            } else {
                pwdInput.type = "password";
                eyeIcon.classList.replace('fa-eye', 'fa-eye-slash');
            }
        }
    </script>
</body>
</html>
